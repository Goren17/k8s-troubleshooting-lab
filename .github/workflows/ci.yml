name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate lab
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: ./scripts/validate-scripts.sh

      - name: Validate scenario contract
        run: ./scripts/validate-scenarios.sh

      - name: Install YAML parser
        run: python3 -m pip install --user pyyaml

      - name: Parse YAML manifests
        run: |
          python3 - <<'PY'
          import pathlib
          import yaml

          files = sorted(pathlib.Path("scenarios").glob("**/*.yaml"))
          for path in files:
              with path.open() as manifest:
                  yaml.safe_load(manifest)

          print(f"parsed {len(files)} yaml files")
          PY

      - name: Validate Kubernetes schemas
        uses: docker://ghcr.io/yannh/kubeconform:v0.7.0
        with:
          args: >-
            -strict
            -summary
            -ignore-missing-schemas
            scenarios
