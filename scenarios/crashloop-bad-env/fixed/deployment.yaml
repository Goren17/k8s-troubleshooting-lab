apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-api
  labels:
    app: crashloop-api
    troubleshooting-lab/scenario: crashloop-bad-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-api
  template:
    metadata:
      labels:
        app: crashloop-api
        troubleshooting-lab/scenario: crashloop-bad-env
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ -z "$DATABASE_URL" ]; then
                echo "fatal: DATABASE_URL is empty"
                exit 1
              fi
              echo "connected to $DATABASE_URL"
              sleep 3600
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: crashloop-app-config
                  key: DATABASE_URL
