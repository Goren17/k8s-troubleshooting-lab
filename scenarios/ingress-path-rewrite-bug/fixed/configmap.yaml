apiVersion: v1
kind: ConfigMap
metadata:
  name: rewrite-demo-nginx
  labels:
    troubleshooting-lab/scenario: ingress-path-rewrite-bug
data:
  default.conf: |
    server {
      listen 80;

      location = / {
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      location = /users {
        add_header Content-Type text/plain;
        return 200 "users\n";
      }

      location / {
        add_header Content-Type text/plain;
        return 404 "not found\n";
      }
    }

